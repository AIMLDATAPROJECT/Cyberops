global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'orchestrator'
    static_configs:
      - targets: ['orchestrator:8000']
    metrics_path: /metrics

  - job_name: 'ai-agent'
    static_configs:
      - targets: ['ai-agent:8001']
    metrics_path: /metrics

  - job_name: 'data-agent'
    static_configs:
      - targets: ['data-agent:8002']
    metrics_path: /metrics

  - job_name: 'devops-agent'
    static_configs:
      - targets: ['devops-agent:8003']
    metrics_path: /metrics

  - job_name: 'netmon-agent'
    static_configs:
      - targets: ['netmon-agent:8004']
    metrics_path: /metrics

  - job_name: 'security-agent'
    static_configs:
      - targets: ['security-agent:8005']
    metrics_path: /metrics

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
